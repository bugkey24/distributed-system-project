# Upstream block with 3 backend servers (Downsized for compliance)
# Using the Least Connection method
upstream backend_pool {
    least_conn;

    server backend1:9000 max_fails=3 fail_timeout=30s;
    server backend2:9000 max_fails=3 fail_timeout=30s;
    server backend3:9000 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

# Main server block (Load Balancer)
server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 10M;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handling
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass backend_pool;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # FastCGI optimizations
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
    }

    # Static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# -------------------------------------------------------------------------
# Direct Access Server Blocks for Testing (8001-8003)
# -------------------------------------------------------------------------

server {
    listen 8001;
    location / {
        include fastcgi_params;
        fastcgi_pass backend1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }
}

server {
    listen 8002;
    location / {
        include fastcgi_params;
        fastcgi_pass backend2:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }
}

server {
    listen 8003;
    location / {
        include fastcgi_params;
        fastcgi_pass backend3:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }
}
